# Copy to inventory.ini and fill in your host. inventory.ini is gitignored
# so host-identifying details (IP, user, key) stay out of version control.
[vps]
your.server.ip.here ansible_user=YOUR_SUDO_USER ansible_ssh_private_key_file=~/.ssh/your_key

[vps:vars]
ansible_python_interpreter=/usr/bin/python3
