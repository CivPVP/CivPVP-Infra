---
kira_image: "ghcr.io/civmc/kira:2.1.1"
rabbitmq_image: "rabbitmq:3.13-management"
postgres_image: "timescale/timescaledb:2.14.2-pg14"
kira_dir: /opt/kira

# --- Phase 2b: gateway deploy ---
# Built jar from the sibling kira-gateway repo (../../kira-gateway from ansible/).
# Only the Paper jar is needed: both mint-servers backends are Paper (any Velocity
# proxy in the network is not in this account, so not ours to deploy to).
paper_gateway_jar: "{{ playbook_dir }}/../../kira-gateway/kirabukkitgateway-paper/build/libs/kirabukkitgateway-paper-2.0.3-civpvp-all.jar"

# Per-backend deploy targets. server_name = the routing key Kira binds on.
# sftp_{host,user}_var name the vault keys for that server's SFTP endpoint;
# mint-servers gives each game server its own SFTP host + username.
paper_servers:
  - server_name: citadel
    sftp_host_var: vault_sftp_host_citadel
    sftp_user_var: vault_sftp_user_citadel
  # lobby is intentionally skipped: it lacks NameLayer + CivChat2, which
  # KiraBukkitGateway hard-depends on. Re-add if those plugins are installed.
