---
- name: Create kira base dir (root-only — the real access gate)
  ansible.builtin.file:
    path: "{{ kira_dir }}"
    state: directory
    mode: "0750"

# 0755 so the in-container rabbitmq user (uid 999) can traverse to read the
# certs. Non-root host users are still blocked by the 0750 parent above.
- name: Create certs dir
  ansible.builtin.file:
    path: "{{ kira_dir }}/certs"
    state: directory
    mode: "0755"

# server.key is 0644 so the in-container rabbitmq user (uid 999) can read the
# bind-mounted key. Safe here: the host is hardened and /opt/kira/certs is
# root-only (0750), so no non-root host user can read it.
- name: Copy CA + server cert/key to the VPS
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/certs/{{ item.f }}"
    dest: "{{ kira_dir }}/certs/{{ item.f }}"
    mode: "{{ item.m }}"
  loop:
    - { f: ca.crt, m: "0644" }
    - { f: server.crt, m: "0644" }
    - { f: server.key, m: "0644" }

- name: Render rabbitmq.conf
  ansible.builtin.template:
    src: rabbitmq.conf.j2
    dest: "{{ kira_dir }}/rabbitmq.conf"
    mode: "0644"

- name: Render Kira config.json
  ansible.builtin.template:
    src: kira-config.json.j2
    dest: "{{ kira_dir }}/config.json"
    mode: "0640"

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ kira_dir }}/docker-compose.yml"
    mode: "0644"

- name: Pull images and bring the stack up
  community.docker.docker_compose_v2:
    project_src: "{{ kira_dir }}"
    pull: always
    state: present
    wait: true
