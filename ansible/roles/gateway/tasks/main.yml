---
- name: Render Paper gateway configs locally
  ansible.builtin.template:
    src: paper-config.yml.j2
    dest: "/tmp/kira-gw-{{ item.server_name }}-config.yml"
    mode: "0600"
  loop: "{{ paper_servers }}"

# lftp does the SFTP push. Password is fed via LFTP_PASSWORD env var (NOT
# `-u user,pass`, which would leak the password into argv / ps). One lftp
# invocation per server uploads all three files in a single SFTP session +
# mkdir -p's plugins/KiraBukkitGateway/ first, since Bukkit only creates that
# dir after the plugin first loads. Requires `brew install lftp` locally.
- name: Push gateway jar + config + truststore via SFTP (one session per server)
  ansible.builtin.command:
    cmd: >
      lftp -e "set sftp:auto-confirm yes;
               open --env-password
                    -u {{ lookup('vars', item.sftp_user_var) }}
                    sftp://{{ lookup('vars', item.sftp_host_var) }}:{{ vault_sftp_port }};
               mkdir -p -f plugins/KiraBukkitGateway;
               put {{ paper_gateway_jar }} -o plugins/{{ paper_gateway_jar | basename }};
               put /tmp/kira-gw-{{ item.server_name }}-config.yml -o plugins/KiraBukkitGateway/config.yml;
               put {{ playbook_dir }}/certs/truststore.p12 -o plugins/KiraBukkitGateway/truststore.p12;
               bye"
  environment:
    LFTP_PASSWORD: "{{ vault_sftp_password }}"
  loop: "{{ paper_servers }}"
  no_log: true

- name: Manual restart checkpoint
  ansible.builtin.pause:
    prompt: |
      Uploaded gateway jar + config + truststore to: {{ paper_servers | map(attribute='server_name') | join(', ') }}.
      Now click RESTART for each one in the mint-servers panel, then press Enter to continue.
  tags: manual_restart
