---
- name: Render Paper gateway configs locally
  ansible.builtin.template:
    src: paper-config.yml.j2
    dest: "/tmp/kira-gw-{{ item.server_name }}-config.yml"
    mode: "0600"
  loop: "{{ paper_servers }}"

# Three pushes per server, each on its own SFTP connection but with proper
# Ansible changed/ok semantics and size-based idempotency (custom local module
# at library/sftp_put.py, paramiko-based — no remote shell required, which is
# why ansible.builtin.copy doesn't work against SFTP-only panels).

- name: Push Paper gateway jar
  sftp_put:
    host: "{{ lookup('vars', item.sftp_host_var) }}"
    port: "{{ vault_sftp_port }}"
    username: "{{ lookup('vars', item.sftp_user_var) }}"
    password: "{{ vault_sftp_password }}"
    src: "{{ paper_gateway_jar }}"
    dest: "plugins/{{ paper_gateway_jar | basename }}"
  loop: "{{ paper_servers }}"
  no_log: true

- name: Push gateway config (creates plugins/KiraBukkitGateway/ if missing)
  sftp_put:
    host: "{{ lookup('vars', item.sftp_host_var) }}"
    port: "{{ vault_sftp_port }}"
    username: "{{ lookup('vars', item.sftp_user_var) }}"
    password: "{{ vault_sftp_password }}"
    src: "/tmp/kira-gw-{{ item.server_name }}-config.yml"
    dest: "plugins/KiraBukkitGateway/config.yml"
  loop: "{{ paper_servers }}"
  no_log: true

- name: Push CA truststore
  sftp_put:
    host: "{{ lookup('vars', item.sftp_host_var) }}"
    port: "{{ vault_sftp_port }}"
    username: "{{ lookup('vars', item.sftp_user_var) }}"
    password: "{{ vault_sftp_password }}"
    src: "{{ playbook_dir }}/certs/truststore.p12"
    dest: "plugins/KiraBukkitGateway/truststore.p12"
  loop: "{{ paper_servers }}"
  no_log: true

- name: Manual restart checkpoint
  ansible.builtin.pause:
    prompt: |
      Uploaded gateway jar + config + truststore to: {{ paper_servers | map(attribute='server_name') | join(', ') }}.
      Now click RESTART for each one in the mint-servers panel, then press Enter to continue.
